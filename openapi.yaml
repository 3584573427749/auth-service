openapi: 3.0.3
info:
  title: Auth Service API
  version: 1.0.0
  description: >-
    OpenAPI för autentiserings- och användarhanteringstjänster i simning.ax-miljön

paths:
  /users:
    post:
      summary: Create user
      operationId: createUser
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                required:
                  - statusCode
                  - data
                properties:
                  statusCode:
                    type: integer
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid JSON
          content:
            application/json:
              schema:
                type: object
                required:
                  - statusCode
                  - data
                properties:
                  statusCode:
                    type: integer
                  data:
                    $ref: '#/components/schemas/ValidationErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                type: object
                required:
                  - statusCode
                  - data
                properties:
                  statusCode:
                    type: integer
                  data:
                    $ref: '#/components/schemas/ValidationErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                required:
                  - statusCode
                  - data
                properties:
                  statusCode:
                    type: integer
                  data:
                    $ref: '#/components/schemas/ValidationErrorResponse'
    get:
      summary: Get all users
      operationId: getAllUsers
      tags:
        - Users
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - statusCode
                  - data
                properties:
                  statusCode:
                    type: integer
                    example: 200
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      summary: Get user by ID
      operationId: getUserById
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - statusCode
                  - data
                properties:
                  statusCode:
                    type: integer
                    example: 200
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                required:
                  - statusCode
                  - data
                properties:
                  statusCode:
                    type: integer
                    example: 404
                  data:
                    $ref: '#/components/schemas/ValidationErrorResponse'
components:
  schemas:
    ValidationErrorResponse:
      type: object
      required:
        - error
        - fields
        - indata
      properties:
        error:
          type: string
          example: Validation failed.

        fields:
          type: object
          additionalProperties:
            type: string
          example:
            email: Email is invalid.

        indata:
          type: object
          additionalProperties: true

    CreateUserRequest:
      type: object
      required:
        - email
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        firstName:
          type: string
          minLength: 2
          example: User
        lastName:
          type: string
          minLength: 2
          example: Name

    User:
      type: object
      required:
        - id
        - email
        - firstName
        - lastName
        - roles
        - updatedAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid

        email:
          type: string
          format: email

        firstName:
          type: string

        lastName:
          type: string

        roles:
          type: array
          items:
            type: string
          example:
            - user

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time
          nullable: true